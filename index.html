<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NOVA Space Planning · Philippines Retail Map (Cesium Edition)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">
  <div id="cesiumContainer"></div>

  <div class="fx-vignette"></div>
  <div class="fx-grid"></div>

  <div id="boot-overlay">
    <div class="boot-inner">
      <div class="boot-logo">NOVA<span>·</span>SPACE PLANNING</div>
      <div class="boot-bar"><div class="boot-bar-fill"></div></div>
      <div class="boot-status">Initializing satellite feed…</div>
    </div>
  </div>

  <header class="topbar glass">
    <div class="topbar-left">
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-text">
          <span class="brand-name">NOVA</span>
          <span class="brand-sub">SPACE PLANNING INTELLIGENCE</span>
        </div>
      </div>
      <nav class="breadcrumb" id="breadcrumb">
        <span class="crumb active" id="btn-philippines">Philippines</span>
      </nav>
    </div>
    <div class="topbar-right">
      <div class="live-pill"><span class="dot"></span>LIVE FEED</div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </header>

  <aside class="panel panel-left glass" id="dashboard-panel">
    <div class="panel-header">
      <h2 id="dash-title">Philippines Overview</h2>
      <span class="panel-tag" id="dash-tag">NETWORK</span>
    </div>

    <div class="stat-grid" id="stat-grid">
      <div class="stat-card">
        <span class="stat-label">Total Stores</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
      <div class="stat-card stat-green">
        <span class="stat-label">Approved</span>
        <span class="stat-value" id="stat-approved">0</span>
      </div>
      <div class="stat-card stat-amber">
        <span class="stat-label">Pending</span>
        <span class="stat-value" id="stat-pending">0</span>
      </div>
      <div class="stat-card stat-red">
        <span class="stat-label">Issues</span>
        <span class="stat-value" id="stat-issue">0</span>
      </div>
    </div>
    
    <div class="panel-divider"></div>
    <div class="panel-subhead">Regional Operations</div>
    <div class="region-list" id="region-list">
      </div>
  </aside>

</div>

<script src="data.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>
